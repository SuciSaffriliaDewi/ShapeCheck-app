<ion-app>
  <ion-router-outlet></ion-router-outlet>

  <!-- Bottom nav hanya muncul jika halaman benar DAN keyboard tertutup -->
  <div class="bottom-nav-wrap" *ngIf="showBottomNav && !isKeyboardOpen">

    <div class="bottom-nav">

      <div class="nav-item" [class.active]="activeTab === 'gender-select'" (click)="navigateTo('gender-select')">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z" />
          <path d="M9 21V12h6v9" />
        </svg>
        <span class="nav-lbl">Home</span>
        <div class="nav-dot"></div>
      </div>

      <div class="nav-item" [class.active]="activeTab === 'history'" (click)="navigateTo('history')">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
        </svg>
        <span class="nav-lbl">Tersimpan</span>
        <div class="nav-dot"></div>
      </div>

      <div class="nav-item" [class.active]="activeTab === 'settings'" (click)="navigateTo('settings')">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
        <span class="nav-lbl">Pengaturan</span>
        <div class="nav-dot"></div>
      </div>

    </div>
  </div>
</ion-app>
